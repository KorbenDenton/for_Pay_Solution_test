---
- name: Ensure Ubuntu server is in a secure basic state
  hosts: server
  become: yes
  roles:
    - configuration

- name: Deploy monitoring agent
  hosts: server
  become: yes
  vars:
    monitoring_server_ip: "192.168.1.100"  # IP твоего Prometheus
  roles:
    - node_exporter
  tasks:
    - name: Open port for Prometheus scraping
      community.general.ufw:
        rule: allow
        port: '9100'
        proto: tcp
        src: "{{ monitoring_server_ip }}"
  
- name: Deploy app with vault secrets
  hosts: server
  become: yes
  roles:
    - example_app